spring:
  datasource:
    url: jdbc:tc:postgresql:16:///fintrack_auth_test
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    username: fintrack
    password: fintrack_secret

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: localhost
      port: 6379
      password: ''

fintrack:
  jwt:
    secret: test-secret-key-for-testing-only-32chars
    expiration-ms: 3600000
    refresh-expiration-ms: 86400000

logging:
  level:
    com.fintrack: DEBUG
