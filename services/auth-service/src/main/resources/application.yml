server:
  port: 8081

spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:postgresql://${AUTH_DB_HOST:localhost}:${AUTH_DB_PORT:5432}/${AUTH_DB_NAME:fintrack_auth}
    username: ${AUTH_DB_USERNAME:fintrack}
    password: ${AUTH_DB_PASSWORD:fintrack_secret}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis_secret}

  security:
    oauth2:
      resourceserver:
        jwt:
          secret: ${JWT_SECRET:dev-secret-key-change-in-production-min-32-chars}

fintrack:
  jwt:
    secret: ${JWT_SECRET:dev-secret-key-change-in-production-min-32-chars}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}         # 1h
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:86400000}  # 24h

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.fintrack: DEBUG
    org.springframework.security: INFO
