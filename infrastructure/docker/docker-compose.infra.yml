version: "3.9"

# FinTrack — Infrastructure locale
# Lance uniquement les services d'infrastructure (pas les apps)
# Usage : docker-compose -f docker-compose.infra.yml up -d

networks:
  fintrack-net:
    driver: bridge

volumes:
  auth_db_data:
  tx_db_data:
  budget_db_data:
  report_db_data:
  redis_data:
  kafka_data:
  zookeeper_data:
  prometheus_data:
  grafana_data:

services:
  # PostgreSQL — auth-service
  auth-db:
    image: postgres:16-alpine
    container_name: fintrack-auth-db
    environment:
      POSTGRES_DB: ${AUTH_DB_NAME:-fintrack_auth}
      POSTGRES_USER: ${AUTH_DB_USERNAME:-fintrack}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD:-fintrack_secret}
    ports:
      - "5432:5432"
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    networks:
      - fintrack-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AUTH_DB_USERNAME:-fintrack}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL — transaction-service
  tx-db:
    image: postgres:16-alpine
    container_name: fintrack-tx-db
    environment:
      POSTGRES_DB: ${TX_DB_NAME:-fintrack_transactions}
      POSTGRES_USER: ${TX_DB_USERNAME:-fintrack}
      POSTGRES_PASSWORD: ${TX_DB_PASSWORD:-fintrack_secret}
    ports:
      - "5433:5432"
    volumes:
      - tx_db_data:/var/lib/postgresql/data
    networks:
      - fintrack-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TX_DB_USERNAME:-fintrack}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL — budget-service
  budget-db:
    image: postgres:16-alpine
    container_name: fintrack-budget-db
    environment:
      POSTGRES_DB: ${BUDGET_DB_NAME:-fintrack_budgets}
      POSTGRES_USER: ${BUDGET_DB_USERNAME:-fintrack}
      POSTGRES_PASSWORD: ${BUDGET_DB_PASSWORD:-fintrack_secret}
    ports:
      - "5434:5432"
    volumes:
      - budget_db_data:/var/lib/postgresql/data
    networks:
      - fintrack-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${BUDGET_DB_USERNAME:-fintrack}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL — report-service
  report-db:
    image: postgres:16-alpine
    container_name: fintrack-report-db
    environment:
      POSTGRES_DB: ${REPORT_DB_NAME:-fintrack_reports}
      POSTGRES_USER: ${REPORT_DB_USERNAME:-fintrack}
      POSTGRES_PASSWORD: ${REPORT_DB_PASSWORD:-fintrack_secret}
    ports:
      - "5435:5432"
    volumes:
      - report_db_data:/var/lib/postgresql/data
    networks:
      - fintrack-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${REPORT_DB_USERNAME:-fintrack}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    container_name: fintrack-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - fintrack-net
    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "--no-auth-warning",
          "-a",
          "${REDIS_PASSWORD:-redis_secret}",
          "ping",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Zookeeper (requis par Kafka)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.0
    container_name: fintrack-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    networks:
      - fintrack-net

  # Kafka
  kafka:
    image: confluentinc/cp-kafka:7.7.0
    container_name: fintrack-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - fintrack-net
    healthcheck:
      test:
        [
          "CMD",
          "kafka-topics",
          "--bootstrap-server",
          "localhost:9092",
          "--list",
        ]
      interval: 30s
      timeout: 10s
      retries: 5

  # Kafka UI (optionnel — visualiser les topics)
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: fintrack-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: fintrack-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - fintrack-net

  # Prometheus
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: fintrack-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    networks:
      - fintrack-net

  # Grafana
  grafana:
    image: grafana/grafana:11.2.0
    container_name: fintrack-grafana
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    networks:
      - fintrack-net

  # Zipkin (Distributed Tracing)
  zipkin:
    image: openzipkin/zipkin:3
    container_name: fintrack-zipkin
    ports:
      - "9411:9411"
    networks:
      - fintrack-net
