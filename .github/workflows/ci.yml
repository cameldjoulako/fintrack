name: CI — Build & Test

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ develop, main ]

jobs:
  # ------------------------------------------------------------
  # Backend — Build & Test tous les services en parallèle
  # ------------------------------------------------------------
  backend:
    name: Backend (${{ matrix.service }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - api-gateway
          - auth-service
          - transaction-service
          - budget-service
          - notification-service
          - report-service
          - exchange-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build & Test — ${{ matrix.service }}
        run: |
          mvn -B verify \
            -pl services/${{ matrix.service }} \
            -am \
            --no-transfer-progress
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Upload JaCoCo report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-${{ matrix.service }}
          path: services/${{ matrix.service }}/target/site/jacoco/

  # ------------------------------------------------------------
  # Frontend — Lint, Test, Build Angular
  # ------------------------------------------------------------
  frontend:
    name: Frontend (Angular 22)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/fintrack-web/package-lock.json

      - name: Install dependencies
        working-directory: frontend/fintrack-web
        run: npm ci

      - name: Lint
        working-directory: frontend/fintrack-web
        run: npm run lint

      - name: Unit tests
        working-directory: frontend/fintrack-web
        run: npm run test:ci

      - name: Build
        working-directory: frontend/fintrack-web
        run: npm run build -- --configuration production

  # ------------------------------------------------------------
  # Docker build validation (pas de push sur PR)
  # ------------------------------------------------------------
  docker-validate:
    name: Docker Build Validation (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: backend

    strategy:
      matrix:
        service:
          - auth-service
          - transaction-service
          - budget-service
          - notification-service
          - report-service
          - exchange-service
          - api-gateway

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Package JAR
        run: |
          mvn -B package \
            -pl services/${{ matrix.service }} \
            -am \
            -DskipTests \
            --no-transfer-progress

      - name: Docker build (validate only)
        run: |
          docker build \
            -t fintrack/${{ matrix.service }}:ci \
            services/${{ matrix.service }}
